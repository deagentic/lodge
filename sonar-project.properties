sonar.projectKey=lodge
sonar.projectName=Lodge
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/node_modules/**,**/site/**

sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

sonar.python.bandit.reportPaths=reports/bandit.json
sonar.python.flake8.reportPaths=reports/flake8.txt
sonar.python.mypy.reportPaths=reports/mypy.txt
sonar.python.pylint.reportPaths=reports/pylint.txt
sonar.python.ruff.reportPaths=reports/ruff.json
