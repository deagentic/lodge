default_stages: [pre-commit, manual]

repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.4.10
      hooks:
        - id: ruff
          name: "ruff"
          args: ["--fix", "--exit-non-zero-on-fix"]
        - id: ruff-format
          name: "ruff format"

    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.6.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-json
          - id: check-added-large-files
          - id: check-case-conflict
          - id: check-merge-conflict
          - id: debug-statements

    - repo: https://github.com/PyCQA/flake8
      rev: 7.1.0
      hooks:
        - id: flake8
          name: "Cognitive Complexity (flake8-cognitive-complexity)"
          additional_dependencies: ["flake8-cognitive-complexity"]
          args: ["--max-cognitive-complexity=11", "--select=CCR001"]
          exclude: "^(.venv|venv|__pycache__|dist|build)/"

    - repo: local
      hooks:
          - id: imports
            name: "Import Linter"
            language: system
            pass_filenames: false
            entry: lint-imports

          - id: mypy
            name: "mypy"
            language: system
            entry: mypy
            types: [python]
            pass_filenames: false
            args: ["src/"]

          - id: check-mermaid
            name: "Mermaid Syntax Check"
            language: system
            entry: cornerstone check-mermaid
            files: \.mermaid$
            pass_filenames: true

          - id: cornerstone-adr-gate
            name: "ADR Gate (pre-push)"
            language: system
            entry: cornerstone adr-gate
            pass_filenames: false
            stages: [pre-push]

          - id: cornerstone-commit-gate
            name: "Commit Gate (commit-msg)"
            language: system
            entry: bash -c 'cornerstone commit-gate --message "$(cat $1)"' --
            pass_filenames: true
            stages: [commit-msg]
