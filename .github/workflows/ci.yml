name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  gitflow-gate:
    name: Gitflow Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/checkout@v4
        with:
          repository: deagentic/cornerstone
          token: ${{ secrets.GH_PAT }}
          path: .cornerstone-src
      - name: Install cornerstone
        run: pip install ./.cornerstone-src
      - name: Run gitflow-gate
        run: cornerstone gitflow-gate

  semver-gate:
    name: Semver Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/checkout@v4
        with:
          repository: deagentic/cornerstone
          token: ${{ secrets.GH_PAT }}
          path: .cornerstone-src
      - name: Install cornerstone
        run: pip install ./.cornerstone-src
      - name: Run semver-gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          export BASE_SHA
          cornerstone semver-gate

  commit-gate:
    name: Commit Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/checkout@v4
        with:
          repository: deagentic/cornerstone
          token: ${{ secrets.GH_PAT }}
          path: .cornerstone-src
      - name: Install cornerstone
        run: pip install ./.cornerstone-src
      - name: Run commit-gate
        run: cornerstone commit-gate --message "${{ github.event.head_commit.message }}"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/checkout@v4
        with:
          repository: deagentic/cornerstone
          token: ${{ secrets.GH_PAT }}
          path: .cornerstone-src
      - name: Install cornerstone
        run: pip install ./.cornerstone-src
      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Import contracts
        run: lint-imports

      - name: ADR gate
        run: cornerstone adr-gate
        continue-on-error: false

      - name: Validate Mermaid Diagrams
        run: cornerstone check-mermaid

      - name: Full suite with 100% coverage (non-negotiable)
        run: |
          pytest tests/ \
            --cov=src \
            --cov-branch \
            --cov-fail-under=100 \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  sonarqube:
    name: SonarQube — Cognitive Complexity Gate
    runs-on: ubuntu-latest
    needs: test
    if: ${{ vars.SONAR_HOST_URL != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provision SonarQube project
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          PROJECT_KEY=$(grep "^sonar.projectKey=" sonar-project.properties | cut -d= -f2)
          PROJECT_NAME=$(grep "^sonar.projectName=" sonar-project.properties | cut -d= -f2)
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${SONAR_TOKEN}:" \
            -X POST \
            --data-urlencode "name=${PROJECT_NAME}" \
            --data-urlencode "project=${PROJECT_KEY}" \
            "${SONAR_HOST_URL}/api/projects/create")
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 400 ]; then
            echo "SonarQube project provisioning failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "SonarQube project ready (HTTP $HTTP_STATUS)"

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
